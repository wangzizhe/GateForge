name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  public-test-suite:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile public Python sources
        run: python -m compileall gateforge tests scripts
      - name: Run public unit tests
        run: |
          python -m unittest \
            tests.test_llm_provider_adapter \
            tests.test_agent_modelica_agent_profile_registry_v1 \
            tests.test_agent_modelica_omc_workspace_v1 \
            tests.test_agent_modelica_workspace_style_probe_v0_67 \
            tests.test_agent_modelica_admission_failure_stage_v1 \
            tests.test_ci_runner_contract \
            tests.test_ci_shard_config_contract \
            -v
      - name: Guard public tree against internal markers
        run: |
          pattern='assets''_private|CHANGELOG''_INTERNAL|CLEAN''_SOURCE''_BACKED|BENCHMARK''_LEDGER|internal''_docs|task_[0-9]{3,}'
          if git grep -n -E "$pattern" -- . ':!.github/workflows/ci.yml' ':!.gitignore'; then
            echo "Internal marker found in public tree"
            exit 1
          fi
